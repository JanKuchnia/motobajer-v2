          - heading "O usłudze" [level=2] [ref=e41]
          - paragraph [ref=e42]: Mechanika ogólna to fundament naszego warsztatu. Nasi mechanicy z ponad 18-letnim doświadczeniem przeprowadzają pełen zakres napraw — od wymiany rozrządu, przez naprawę układu napędowego, po generalne remonty silników. Pracujemy na częściach oryginalnych oraz sprawdzonych zamiennikach marek dostępnych w naszym sklepie. Każda naprawa jest dokumentowana i objęta gwarancją serwisową.
